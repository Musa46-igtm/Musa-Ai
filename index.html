<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Musa AI</title>
<script src="https://js.puter.com/v2/"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --void:        #050508;
  --deep:        #0a0a12;
  --glass:       rgba(255,255,255,0.045);
  --glass-md:    rgba(255,255,255,0.07);
  --glass-hi:    rgba(255,255,255,0.10);
  --border:      rgba(255,255,255,0.08);
  --border-hi:   rgba(255,255,255,0.14);
  --ink:         #f0f0f8;
  --ink-2:       rgba(240,240,248,0.55);
  --ink-3:       rgba(240,240,248,0.28);
  --signal:      #5b8fff;
  --signal-2:    #7c6fff;
  --signal-glow: rgba(91,143,255,0.20);
  --signal-deep: rgba(91,143,255,0.10);
  --dev:         #00e5a0;
  --root:        #ff3d6b;
  --warn:        #f59e0b;
  --success:     #00e5a0;
  --r:           16px;
  --r-lg:        24px;
  --r-xl:        32px;
  --sans:        'Plus Jakarta Sans','Inter',system-ui,sans-serif;
  --body:        'Inter',system-ui,sans-serif;
  --mono:        'JetBrains Mono',monospace;
  --ease:        cubic-bezier(0.4,0,0.2,1);
  --dur:         0.22s;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;}
body{font-family:var(--body);background:var(--void);color:var(--ink);display:flex;height:100vh;height:100dvh;}

body::before{content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at -10% -10%,rgba(91,143,255,0.13) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 110% 110%,rgba(124,111,255,0.10) 0%,transparent 55%),
    radial-gradient(ellipse 50% 40% at 50% 50%,rgba(91,143,255,0.04) 0%,transparent 70%);
  animation:meshFloat 22s ease-in-out infinite alternate;pointer-events:none;}
@keyframes meshFloat{0%{opacity:1;transform:scale(1)}50%{opacity:.75;transform:scale(1.05) translateY(-14px)}100%{opacity:1;transform:scale(1)}}

body::after{content:'';position:fixed;inset:0;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:.025;pointer-events:none;}

body[data-theme="light"]{
  --void:#eef0f8;--deep:#e4e6f2;
  --glass:rgba(255,255,255,0.55);--glass-md:rgba(255,255,255,0.70);--glass-hi:rgba(255,255,255,0.85);
  --border:rgba(0,0,20,0.08);--border-hi:rgba(0,0,20,0.14);
  --ink:#0e0e1a;--ink-2:rgba(14,14,26,0.55);--ink-3:rgba(14,14,26,0.30);
  --signal:#3a6fef;--signal-glow:rgba(58,111,239,0.16);--signal-deep:rgba(58,111,239,0.08);}
body[data-theme="light"]::before{
  background:radial-gradient(ellipse 80% 60% at -10% -10%,rgba(91,143,255,0.07) 0%,transparent 60%),
             radial-gradient(ellipse 60% 50% at 110% 110%,rgba(124,111,255,0.05) 0%,transparent 55%);}

/* ── AUTH ───────────────────────────────────────── */
#authScreen{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--void);}
#authScreen.hidden{display:none;}
.auth-orb{position:absolute;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;}
.auth-orb-1{width:520px;height:520px;background:radial-gradient(circle,rgba(91,143,255,0.20) 0%,transparent 70%);top:-140px;left:-120px;animation:orbA 16s ease-in-out infinite alternate;}
.auth-orb-2{width:420px;height:420px;background:radial-gradient(circle,rgba(124,111,255,0.15) 0%,transparent 70%);bottom:-100px;right:-80px;animation:orbB 20s ease-in-out infinite alternate;}
.auth-orb-3{width:280px;height:280px;background:radial-gradient(circle,rgba(0,229,160,0.08) 0%,transparent 70%);top:50%;right:10%;animation:orbA 24s ease-in-out infinite alternate;}
@keyframes orbA{to{transform:translate(50px,70px) scale(1.12)}}
@keyframes orbB{to{transform:translate(-40px,-50px) scale(0.88)}}

.auth-card{
  position:relative;z-index:1;width:100%;max-width:420px;
  background:rgba(255,255,255,0.042);
  backdrop-filter:blur(100px) saturate(200%);-webkit-backdrop-filter:blur(100px) saturate(200%);
  border:1px solid rgba(255,255,255,0.10);border-radius:var(--r-xl);padding:46px 44px 50px;
  box-shadow:0 0 0 1px rgba(255,255,255,0.04) inset,0 70px 140px rgba(0,0,0,0.65),0 0 100px rgba(91,143,255,0.07);}
.auth-card::before{content:'';position:absolute;top:0;left:18%;right:18%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.32),transparent);border-radius:1px;}

.auth-logo-row{display:flex;align-items:center;gap:13px;margin-bottom:6px;}
.auth-logo-svg{width:44px;height:44px;flex-shrink:0;filter:drop-shadow(0 4px 16px rgba(91,143,255,0.5));}
.auth-brand{font-family:var(--sans);font-size:25px;font-weight:800;color:var(--ink);letter-spacing:-0.5px;}
.auth-tagline{font-size:11px;color:var(--ink-3);font-family:var(--mono);letter-spacing:1px;margin-bottom:38px;}

.auth-label{display:block;font-size:11px;font-weight:600;color:var(--ink-2);letter-spacing:0.6px;margin-bottom:8px;font-family:var(--body);}
.auth-input{
  width:100%;background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);
  border:1px solid var(--border);border-radius:12px;padding:13px 16px;
  color:var(--ink);font-family:var(--body);font-size:14px;outline:none;margin-bottom:16px;
  transition:border-color var(--dur) var(--ease),box-shadow var(--dur) var(--ease),background var(--dur);}
.auth-input:focus{border-color:var(--signal);background:rgba(91,143,255,0.07);box-shadow:0 0 0 3px var(--signal-glow);}
.auth-input::placeholder{color:var(--ink-3);}

.auth-divider{display:flex;align-items:center;gap:12px;margin:4px 0 20px;}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.auth-divider span{font-size:11px;color:var(--ink-3);white-space:nowrap;}

.google-btn{
  width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
  background:rgba(255,255,255,0.065);border:1px solid var(--border-hi);border-radius:12px;
  padding:13px 20px;color:var(--ink);font-family:var(--body);font-size:13px;font-weight:600;
  cursor:pointer;margin-bottom:20px;
  transition:background var(--dur),transform var(--dur),box-shadow var(--dur);}
.google-btn:hover{background:rgba(255,255,255,0.10);transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,0.3);}
.google-icon{width:18px;height:18px;flex-shrink:0;}

.auth-btn{
  width:100%;background:linear-gradient(135deg,var(--signal) 0%,var(--signal-2) 100%);
  border:none;border-radius:12px;padding:14px;margin-top:4px;
  color:#fff;font-family:var(--sans);font-size:14px;font-weight:700;
  cursor:pointer;letter-spacing:0.2px;
  transition:opacity var(--dur),transform var(--dur),box-shadow var(--dur);
  box-shadow:0 8px 32px rgba(91,143,255,0.32);}
.auth-btn:hover{opacity:.92;transform:translateY(-1px);box-shadow:0 14px 44px rgba(91,143,255,0.45);}
.auth-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.auth-toggle{text-align:center;margin-top:22px;font-size:12px;color:var(--ink-2);cursor:pointer;}
.auth-toggle span{color:var(--signal);font-weight:600;}

/* ── LAYOUT ─────────────────────────────────────── */
#sidebarOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.52);backdrop-filter:blur(10px);z-index:150;display:none;}
#sidebarOverlay.visible{display:block;}
@media(min-width:1024px){#sidebarOverlay{display:none!important;}}

#sidebar{
  position:fixed;left:0;top:0;bottom:0;width:278px;
  background:rgba(8,8,16,0.88);
  backdrop-filter:blur(80px) saturate(180%);-webkit-backdrop-filter:blur(80px) saturate(180%);
  border-right:1px solid var(--border);z-index:200;display:flex;flex-direction:column;
  transform:translateX(-100%);transition:transform .28s var(--ease);}
#sidebar.open{transform:translateX(0);box-shadow:40px 0 80px rgba(0,0,0,0.8);}
@media(min-width:1024px){#sidebar{position:relative;transform:none;flex-shrink:0;}}

.sidebar-top{padding:22px 20px 0;flex-shrink:0;border-bottom:1px solid var(--border);padding-bottom:16px;}
.sidebar-brand-row{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.sidebar-logo{width:28px;height:28px;flex-shrink:0;filter:drop-shadow(0 2px 8px rgba(91,143,255,0.4));}
.sidebar-brand-name{font-family:var(--sans);font-size:15px;font-weight:800;color:var(--ink);letter-spacing:-0.3px;}
#closeSidebar{margin-left:auto;cursor:pointer;color:var(--ink-3);font-size:20px;display:none;padding:2px 6px;border-radius:6px;transition:color var(--dur);}
#closeSidebar:hover{color:var(--ink);}

.sidebar-user{display:flex;align-items:center;gap:10px;background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:11px 14px;margin-bottom:12px;}
.sidebar-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--signal),var(--signal-2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;font-family:var(--sans);}
.sidebar-user-info{flex:1;min-width:0;}
.sidebar-user-role{font-size:9px;color:var(--ink-3);letter-spacing:.6px;font-family:var(--mono);}
.sidebar-user-name{font-size:12px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.logout-btn{background:transparent;border:1px solid rgba(255,61,107,0.25);color:var(--root);padding:5px 10px;border-radius:8px;cursor:pointer;font-size:10px;font-weight:700;font-family:var(--body);transition:all var(--dur);flex-shrink:0;}
.logout-btn:hover{background:var(--root);color:#fff;border-color:var(--root);}

.sidebar-actions{display:flex;gap:7px;margin-bottom:12px;}
.sb-action{flex:1;padding:9px;border-radius:11px;background:var(--glass);border:1px solid var(--border);color:var(--ink-2);font-family:var(--body);font-size:11px;font-weight:600;cursor:pointer;transition:all var(--dur);text-align:center;}
.sb-action:hover{border-color:rgba(91,143,255,0.4);color:var(--signal);background:var(--signal-deep);}

#searchChats{width:100%;margin-bottom:12px;background:var(--glass);border:1px solid var(--border);border-radius:11px;padding:9px 14px;color:var(--ink);font-family:var(--body);font-size:12px;outline:none;transition:border-color var(--dur),box-shadow var(--dur);}
#searchChats:focus{border-color:var(--signal);box-shadow:0 0 0 3px var(--signal-glow);}
#searchChats::placeholder{color:var(--ink-3);}

.filter-row{display:flex;gap:6px;overflow-x:auto;scroll-behavior:smooth;padding-bottom:16px;-webkit-overflow-scrolling:touch;scrollbar-width:none;cursor:grab;user-select:none;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-row.grabbing{cursor:grabbing;}
.fpill{flex-shrink:0;padding:5px 13px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:.3px;white-space:nowrap;border:1px solid var(--border);color:var(--ink-3);background:transparent;cursor:pointer;transition:all var(--dur) var(--ease);}
.fpill:hover{border-color:var(--border-hi);color:var(--ink-2);}
.fpill.active{border-color:var(--signal);color:var(--signal);background:var(--signal-deep);}
.fpill[data-filter="DEV_MODE"].active{border-color:var(--dev);color:var(--dev);background:rgba(0,229,160,0.08);}
.fpill[data-filter="ROOT_MODE"].active{border-color:var(--root);color:var(--root);background:rgba(255,61,107,0.08);}
.fpill[data-filter="FAVORITE"].active{border-color:var(--warn);color:var(--warn);background:rgba(245,158,11,0.08);}

.sidebar-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 20px 20px;}
.sidebar-body::-webkit-scrollbar{width:3px;}
.sidebar-body::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px;}
.history-empty{text-align:center;padding:48px 0;font-size:12px;color:var(--ink-3);line-height:2;}

.h-item{position:relative;margin-bottom:7px;padding:13px 14px;background:var(--glass);border:1px solid var(--border);border-radius:14px;cursor:pointer;transition:all var(--dur) var(--ease);}
.h-item:hover{border-color:var(--border-hi);background:var(--glass-md);transform:translateX(3px);}
.h-item.h-fav{border-color:rgba(245,158,11,0.25);}
.h-item-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.h-mode-pill{font-size:9px;font-weight:700;letter-spacing:.8px;font-family:var(--mono);padding:2px 8px;border-radius:100px;}
.h-date{font-size:9px;color:var(--ink-3);font-family:var(--mono);}
.h-title{font-size:12px;font-weight:600;color:var(--ink);line-height:1.4;margin-bottom:5px;padding-right:22px;}
.h-count{font-size:10px;color:var(--ink-3);}
.h-star{position:absolute;top:12px;right:12px;background:none;border:none;cursor:pointer;font-size:13px;color:var(--ink-3);transition:color var(--dur);padding:2px;}
.h-star:hover,.h-star.on{color:var(--warn);}
.h-del{position:absolute;bottom:10px;right:10px;background:rgba(255,61,107,0.10);border:1px solid rgba(255,61,107,0.18);color:var(--root);width:22px;height:22px;border-radius:7px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all var(--dur);}
.h-item:hover .h-del{opacity:1;}
.h-del:hover{background:var(--root);color:#fff;border-color:var(--root);}

/* ── MAIN ───────────────────────────────────────── */
#mainWrapper{flex:1;display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;position:relative;z-index:1;}

header{
  flex-shrink:0;height:60px;display:flex;align-items:center;padding:0 22px;gap:14px;
  background:rgba(8,8,16,0.72);backdrop-filter:blur(60px) saturate(180%);-webkit-backdrop-filter:blur(60px) saturate(180%);
  border-bottom:1px solid var(--border);z-index:100;}
#openSidebar{display:none;cursor:pointer;flex-shrink:0;width:34px;height:34px;border-radius:10px;border:1px solid var(--border);align-items:center;justify-content:center;color:var(--ink-2);font-size:15px;transition:all var(--dur);}
#openSidebar:hover{border-color:var(--signal);color:var(--signal);background:var(--signal-deep);}
@media(max-width:1023px){#openSidebar{display:flex;}}
.header-brand{display:flex;align-items:center;gap:10px;}
.header-logo{width:28px;height:28px;flex-shrink:0;filter:drop-shadow(0 2px 10px rgba(91,143,255,0.45));}
.header-name{font-family:var(--sans);font-size:16px;font-weight:800;color:var(--ink);letter-spacing:-0.3px;}
.header-right{display:flex;align-items:center;gap:8px;margin-left:auto;}
.hbtn{display:flex;align-items:center;gap:6px;padding:6px 13px;border-radius:10px;background:var(--glass);border:1px solid var(--border);color:var(--ink-2);font-family:var(--body);font-size:11px;font-weight:600;cursor:pointer;transition:all var(--dur);white-space:nowrap;}
.hbtn:hover{border-color:var(--border-hi);color:var(--ink);background:var(--glass-md);}
.hbtn.danger:hover{border-color:rgba(255,61,107,0.5);color:var(--root);}
.hbtn.hidden{display:none;}
.mode-switch{display:flex;align-items:center;background:rgba(0,0,0,0.35);border:1px solid var(--border);border-radius:11px;padding:3px;gap:2px;}
.msw-btn{padding:5px 13px;border-radius:8px;background:transparent;border:none;color:var(--ink-3);font-family:var(--body);font-size:10px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all var(--dur);}
.msw-btn.active{background:var(--glass-hi);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,0.4),0 0 0 1px var(--border-hi);}
.msw-btn[data-m="NORMAL_MODE"].active{color:var(--signal);}
.msw-btn[data-m="DEV_MODE"].active{color:var(--dev);}
.msw-btn[data-m="ROOT_MODE"].active{color:var(--root);}
@media(max-width:768px){header{padding:0 14px;height:56px;}.hbtn span{display:none;}.hbtn{padding:7px;}}

/* ── WELCOME ────────────────────────────────────── */
#welcomeScreen{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#welcomeScreen.hidden{display:none;}
.welcome-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:48px 24px 80px;scroll-behavior:smooth;}
.welcome-scroll::-webkit-scrollbar{width:5px;}
.welcome-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:3px;}
.welcome-inner{max-width:680px;margin:0 auto;display:flex;flex-direction:column;align-items:center;}

.welcome-card{
  width:100%;margin-bottom:52px;
  background:rgba(255,255,255,0.038);
  backdrop-filter:blur(80px) saturate(200%);-webkit-backdrop-filter:blur(80px) saturate(200%);
  border:1px solid var(--border);border-radius:var(--r-xl);padding:36px 40px;
  position:relative;overflow:hidden;
  box-shadow:0 30px 80px rgba(0,0,0,0.45),0 0 0 1px rgba(255,255,255,0.04) inset;}
.welcome-card::before{content:'';position:absolute;top:0;left:14%;right:14%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.28),transparent);}
.wc-orb{position:absolute;right:-70px;top:-70px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(91,143,255,0.11) 0%,transparent 70%);pointer-events:none;}
.welcome-greeting{font-family:var(--sans);font-size:28px;font-weight:800;letter-spacing:-.6px;color:var(--ink);margin-bottom:4px;}
.welcome-sub{font-size:14px;color:var(--ink-2);margin-bottom:28px;}
.welcome-stats{display:flex;gap:32px;}
.ws-val{font-family:var(--mono);font-size:22px;font-weight:500;color:var(--signal);}
.ws-lbl{font-size:10px;color:var(--ink-3);letter-spacing:.5px;margin-top:2px;}
.model-badge-pill{position:absolute;top:28px;right:28px;display:flex;align-items:center;gap:6px;background:rgba(0,229,160,0.08);border:1px solid rgba(0,229,160,0.2);border-radius:100px;padding:5px 12px;font-size:10px;font-weight:700;color:var(--dev);font-family:var(--mono);}
.mbp-dot{width:6px;height:6px;border-radius:50%;background:var(--dev);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.sec-label{width:100%;font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-3);margin-bottom:14px;display:flex;align-items:center;gap:12px;}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border);}

.chip-grid{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:40px;}
@media(max-width:560px){.chip-grid{grid-template-columns:1fr;}}
.chip{
  background:rgba(255,255,255,0.028);
  backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
  border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;
  cursor:pointer;text-align:left;transition:all .25s var(--ease);position:relative;overflow:hidden;}
.chip::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--signal-glow) 0%,transparent 60%);opacity:0;transition:opacity .25s;}
.chip:hover{border-color:rgba(91,143,255,.32);transform:translateY(-3px);box-shadow:0 14px 36px rgba(0,0,0,.45);}
.chip:hover::before{opacity:1;}
.chip.chip-dev:hover{border-color:rgba(0,229,160,.3);}
.chip.chip-dev:hover::before{background:linear-gradient(135deg,rgba(0,229,160,.10) 0%,transparent 60%);}
.chip-tag{font-size:9px;font-weight:700;letter-spacing:.8px;font-family:var(--mono);margin-bottom:7px;display:block;}
.chip-tag.norm{color:var(--signal);}.chip-tag.dev{color:var(--dev);}
.chip-text{font-size:13px;font-weight:500;color:var(--ink);line-height:1.45;position:relative;}

.tmpl-grid{width:100%;display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:40px;}
@media(max-width:560px){.tmpl-grid{grid-template-columns:repeat(2,1fr);}}
.tmpl-btn{background:rgba(255,255,255,0.028);border:1px solid var(--border);border-radius:var(--r);padding:16px 14px;cursor:pointer;text-align:left;transition:all .2s var(--ease);color:var(--ink);font-family:var(--body);}
.tmpl-btn:hover{border-color:rgba(91,143,255,.3);background:var(--signal-deep);transform:translateY(-2px);}
.tmpl-icon{font-size:20px;margin-bottom:9px;display:block;}
.tmpl-name{font-size:11px;font-weight:600;color:var(--ink-2);}

.custom-wrap{
  width:100%;display:flex;gap:10px;align-items:flex-end;
  background:rgba(255,255,255,0.038);backdrop-filter:blur(80px) saturate(180%);-webkit-backdrop-filter:blur(80px) saturate(180%);
  border:1px solid var(--border-hi);border-radius:20px;padding:12px 16px;
  box-shadow:0 8px 32px rgba(0,0,0,.32);transition:border-color var(--dur),box-shadow var(--dur);}
.custom-wrap:focus-within{border-color:rgba(91,143,255,.42);box-shadow:0 8px 40px rgba(0,0,0,.45),0 0 0 3px var(--signal-glow);}
.custom-wrap textarea{flex:1;background:transparent;border:none;color:var(--ink);font-family:var(--body);font-size:14px;resize:none;outline:none;max-height:100px;line-height:1.5;padding:6px 0;}
.custom-wrap textarea::placeholder{color:var(--ink-3);}
.custom-send{width:40px;height:40px;flex-shrink:0;background:linear-gradient(135deg,var(--signal),var(--signal-2));border:none;border-radius:12px;color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--dur);box-shadow:0 4px 16px var(--signal-glow);}
.custom-send:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(91,143,255,.48);}
.custom-send:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none;}

/* ── CHAT ───────────────────────────────────────── */
#chatContainer{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#chatContainer.hidden{display:none;}
#chat{flex:1;overflow-y:auto;overflow-x:hidden;padding:28px 24px 16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;}
#chat::-webkit-scrollbar{width:4px;}
#chat::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px;}

/* ── BUBBLES ── */
.msg{max-width:76%;border-radius:22px;word-break:break-word;animation:msgIn .22s var(--ease);font-size:14px;line-height:1.72;}
@keyframes msgIn{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}

.msg.user{
  align-self:flex-end;
  background:linear-gradient(135deg,var(--signal) 0%,var(--signal-2) 100%);
  color:#fff;padding:14px 20px;border-bottom-right-radius:5px;
  box-shadow:0 8px 32px rgba(91,143,255,.28),0 2px 8px rgba(0,0,0,.35);}
.msg.user .msg-meta{color:rgba(255,255,255,.42);}
.msg.user p{margin:0;}

.msg.ai{
  align-self:flex-start;
  background:rgba(255,255,255,0.040);
  backdrop-filter:blur(60px) saturate(160%);-webkit-backdrop-filter:blur(60px) saturate(160%);
  border:1px solid var(--border-hi);padding:16px 20px;border-bottom-left-radius:5px;
  box-shadow:0 8px 32px rgba(0,0,0,.38),0 0 0 1px rgba(255,255,255,.04) inset;}

.msg-mode-tag{display:flex;align-items:center;gap:7px;font-size:9px;font-weight:700;letter-spacing:.8px;font-family:var(--mono);margin-bottom:10px;color:var(--ink-3);}
.mtag-dot{width:5px;height:5px;border-radius:50%;}
.msg-meta{font-size:10px;color:var(--ink-3);font-family:var(--mono);margin-top:10px;}

.msg.ai h1,.msg.ai h2,.msg.ai h3{font-family:var(--sans);margin:14px 0 6px;font-weight:700;}
.msg.ai h1{font-size:19px;}.msg.ai h2{font-size:16px;}.msg.ai h3{font-size:14px;}
.msg.ai p{margin:6px 0;}.msg.ai ul,.msg.ai ol{padding-left:18px;}.msg.ai li{margin:4px 0;}
.msg.ai a{color:var(--signal);text-decoration:underline;}
.msg.ai blockquote{border-left:2px solid var(--signal);padding-left:14px;color:var(--ink-2);margin:8px 0;}
.msg.ai strong{color:var(--ink);font-weight:700;}
.msg.ai code:not(pre code){background:rgba(91,143,255,.12);border:1px solid rgba(91,143,255,.2);border-radius:5px;padding:1px 7px;font-family:var(--mono);font-size:12.5px;color:#a8c4ff;}
.msg pre{background:rgba(0,0,0,.60)!important;border:1px solid var(--border);border-radius:14px;margin:14px 0;overflow:hidden;position:relative;box-shadow:0 4px 20px rgba(0,0,0,.55);}
.code-hdr{background:rgba(255,255,255,.038);backdrop-filter:blur(20px);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.mac-dots{display:flex;gap:6px;}.dot{width:10px;height:10px;border-radius:50%;}
.dot.r{background:#ff5f57;}.dot.y{background:#ffbd2e;}.dot.g{background:#28ca41;}
.code-lang{font-size:10px;color:var(--ink-3);font-family:var(--mono);font-weight:600;letter-spacing:.5px;}
.code-actions{display:flex;gap:6px;}
.code-btn{background:var(--glass);border:1px solid var(--border);color:var(--ink-3);font-size:10px;font-weight:600;padding:4px 10px;border-radius:7px;cursor:pointer;font-family:var(--body);transition:all var(--dur);}
.code-btn:hover{border-color:var(--signal);color:var(--signal);}
.msg code{font-family:var(--mono)!important;font-size:13px;display:block;padding:14px 16px;overflow-x:auto;color:#c8d3f5;line-height:1.65;}

.typing-bubble{align-self:flex-start;background:rgba(255,255,255,0.040);backdrop-filter:blur(60px);border:1px solid var(--border-hi);border-radius:22px;border-bottom-left-radius:5px;padding:16px 20px;box-shadow:0 8px 32px rgba(0,0,0,.35);animation:msgIn .22s var(--ease);}
.typing-dots{display:flex;align-items:center;gap:5px;}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--signal);opacity:.4;animation:td 1.2s infinite var(--ease);}
.typing-dots span:nth-child(2){animation-delay:.16s;}.typing-dots span:nth-child(3){animation-delay:.32s;}
@keyframes td{0%,60%,100%{opacity:.3;transform:scale(.85)}30%{opacity:1;transform:scale(1.05)}}

footer{
  flex-shrink:0;padding:14px 24px;padding-bottom:max(14px,env(safe-area-inset-bottom));
  background:rgba(8,8,16,0.72);backdrop-filter:blur(60px) saturate(180%);-webkit-backdrop-filter:blur(60px) saturate(180%);
  border-top:1px solid var(--border);}
.input-area{
  max-width:900px;margin:0 auto;display:flex;align-items:flex-end;gap:10px;
  background:rgba(255,255,255,0.040);backdrop-filter:blur(80px) saturate(180%);-webkit-backdrop-filter:blur(80px) saturate(180%);
  border:1px solid var(--border-hi);border-radius:20px;padding:10px 14px;
  box-shadow:0 8px 32px rgba(0,0,0,.38);transition:border-color var(--dur),box-shadow var(--dur);}
.input-area:focus-within{border-color:rgba(91,143,255,.42);box-shadow:0 8px 40px rgba(0,0,0,.5),0 0 0 3px var(--signal-glow);}
.input-area textarea{flex:1;background:transparent;border:none;color:var(--ink);font-family:var(--body);font-size:14px;resize:none;outline:none;max-height:120px;line-height:1.5;padding:8px 0;}
.input-area textarea::placeholder{color:var(--ink-3);}
.send-btn{width:40px;height:40px;flex-shrink:0;background:linear-gradient(135deg,var(--signal),var(--signal-2));border:none;border-radius:12px;color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--dur);box-shadow:0 4px 16px var(--signal-glow);}
.send-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(91,143,255,.48);}
.send-btn:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none;}
